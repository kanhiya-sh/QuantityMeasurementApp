server.port=${PORT:8080}
spring.application.name=api-gateway

# FRONTEND_URL must be set in Render env vars to the exact frontend origin
# e.g. https://quantitymeasurementapp-frontend-1pkx.onrender.com
# Default value prevents crash if env var is missing
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Eureka DISABLED — using direct URLs instead
eureka.client.enabled=false
spring.cloud.gateway.discovery.locator.enabled=false

# Direct routes to Railway services
# AUTH_SERVICE_URL and QMA_SERVICE_URL must be set in Render env vars
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=${AUTH_SERVICE_URL}
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/v1/auth/**

spring.cloud.gateway.routes[1].id=qma-service
spring.cloud.gateway.routes[1].uri=${QMA_SERVICE_URL}
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/v1/quantities/**
